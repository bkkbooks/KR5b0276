front:
  text: 靈劔子引導子午記大二
  hash: sha256:340515601af6ca4ed3d0aa852cc7f64ec9e9fee94bd12c4e54adbd2165b15b71
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0276_HFL_000-001a, image: hfl/0320/0320-048.png}
body:
  text: 許旌陽述夜半子少陽之氣生於隂分紆伸轉掣混元經戌亥子三時隂氣生而人寐既寐即氣滯於百節養生家睡不厭縮覺不厭伸轉掣務令榮衛周流鼓腹淘氣淘氣訣閉目仰面停兩乎於乳間側立兩膝舉腰背鼓氣海中氣使內外轉呵而去之不使耳聞一九二九止凡欲服氣須淘轉呵出獨令宿食消化故氣出盡然後始可調而服之服氣人睡覺口乾舌澀是五臟熱即大開口微呵數十遍候喉中津液出是熱退而五臟涼矣踴身令起平身正坐兩手叉項後仰視舉首左右招搖使項與手爭次以手攀腳稍閉氣取太衝之氣太衝二穴在大指本節後二寸骨罅間陷者是左挽如引弓狀右挽亦如之大洞真經按摩篇叉兩手乃度以掩項後仰面視上舉首使項與手爭為之三四令人精和血通風氣不入能久行之無病畢又屈動身體伸手四極反張側掣宣搖百關為之各三華陀别傳云人身欲得勞動但不當自極爾體常動搖穀氣得血脉流通戶樞不蠹流水不腐形體亦然真人導引蓋取諸此元道經云元氣難積而易散關節易閉而難通故修生之士以導引為先氣息平定內視神宮眉間一寸為明堂深三寸為洞房上入三寸為上丹田泥丸宫中丹田為絳宫下丹田為氣宫各有神人故曰神宫叩齒及牙先叩齒當門小鳴後叩大牙大鳴真誥云叩齒所以警身中諸神神不得散則鬼氣不得侵揑目四眥太上三關經常欲以手按目近鼻之兩眥閉氣為之氣通即止終而復始常行之眼能洞見又云導引畢以手按目四眥三九過令見光明是檢眼神之道久為之得見靈也摩手尉目用兩手掌倒立摩掌如火有硫黃氣乃止開目尉睛數次對修常居內經云常以兩手按眉後小穴中二九一年可夜書亦可於人中密行之勿語其狀眉後小穴為上元六合之府主化眼生暈和營精光長珠徹瞳保鍊目瞳是真人坐起之上道一名真人常居真諺云子欲夜書當修常居真人所以能旁觀四逹八遐照燭者實常居之數明也紫微夫人誥仰和天真俯按山源天真是兩眉之角山源是鼻下人中也兩眉之角是徹視之津梁天真是引靈之上房灌溉中嶽消魔經鼻欲得按其左右唯令無數令人氣平所謂灌溉中嶽名書帝籙俯按山源紫微夫人云俯按山源是鼻下人中之本側在鼻下小谷中也楚莊公時市長宋來子常灑掃一市常歌曰天庭發雙華山源障隂邪清晨按天馬來詣太清家真人無那隱又以滅百邪常歌此乞食一市無人解其歌者乞食公西嶽真人馮廷壽也周宣王時史官也手為天馬鼻為山源每經危險之路廟貌之間心中有疑忌之意者乃先反舌內向咽津一二過畢以左手第二第三指攝兩鼻孔下人中之本鼻中隔孔之內際鼻中隔之際曰山源一名鬼井一名神池一名魂臺手按山源則鬼井閉門手薄神池則邪根散分手臨魂臺則玉真守關於是感激靈根天獸來衛千精震伏莫干我氣此自然之理使然也鼻下山源是一身之武津真邪之通府守真者所以遏萬邪在我運攝之耳營治城廓消魔經云耳欲得數按抑左右令無數使人聰徹所謂營治城廓名書皇籍擊探天鼓天鼓者耳中聲也以兩手心緊按耳門以指擊其腦户常欲其聲壯盛相續不散一曰三探有益於下丹田或聲散不續無壯盛者即元氣不集宜整之拭摩神庭真誥云面者神之庭髮者腦之華心悲即面焦腦減則髮素太素丹經云一面之上常欲得兩手摩拭之使熱髙下隨形皆使極匝令人面有光澤皺斑不生行之五年色如少女所謂山澤通氣常盈不沒又云勤而行之手不離面乃佳上朝三元真誥云順手摩髮如理櫛之狀使髮不白以兩手乘額上謂之手朝三元固腦堅髮之道也頭四面以手乘之順髮就結唯令多也黃庭經云一面之神宗泥丸泥丸九真皆有房方圓一寸處其中下摩生門黃庭經云兩部水王對生門生門者臍也閉內氣鼓小腹令滿以手摩一周天山巔取水此在口訣氣海與腎相連屬壬癸水性就下水歸於海不能獨升必以陽配陽既下臨隂即上報故化為雲霧蒸為甘雨潤澤枯槁百骸九竅無所不達煙蘿子所謂火逼水雲濛濛五行相運會成功啓玄子亦云無出則不入無降則無升海底覔火此在口訣世人不蒙師授多將心火為火火屬神且內中罏鼎在心下得心火為火其火在鼎上千經萬論言火從下發未聞火從上來周易卦有水火既濟是上水下火火自臍下起水在鼎中生故曰上水下火訣云但從山頭取水海底起火重陽中取汞重隂中取鉛故行有路取有時世人𥩈用其道不受口訣反受其病通真子歌云解接無根木能挑海底燈古歌亦曰還丹修煉本無形元火烹來即漸成須信神仙路咫尺朗然飛步上青冥飬虎咽氣此在口訣隂真人云若欲長生當服內氣素問云聖人傳精神服天氣而通神明天氣者內氣也隂符經云天生天煞食元和之氣天不能煞地不能埋名之曰真人故修行之士飢食元和之氣渴飲華池之水老子所謂實其腹者此也若未絶粒人欲服氣當須少食務要腹中曠然虛淨然亦無早晚腹空則咽之然而所以要口訣者服氣須分內外辨清濁别咽喉不分內外則吸邪氣不辨清濁則無分兩不別咽喉則不入胃脘偷龍咽津此在口訣人之得體始於北極元泉之下元泉者真一也自丹田上朝舌下二竅謂之神水華池咀嚼至濃養生家名曰鍊精含虛鼓漱攪成大藥其數一周天赤龍不能勝載方為鉛汞重寶內想神宫微微出氣作意咽之直令喉中作聲下入丹田中凝結如雞子潔白狀紫河車歌曰左為日兮右為月兩半同升合為一出彼玉池入金室大如彈丸黃如橘中有佳味甘如蜜子若得之慎勿失審能修之仙道畢內景經亦云舌下玄膺生𢀸岸又曰玉池清水灌靈根審能修之命長存赤城長生記人身上之津液非潄咽則無以灌溉於五臟發其光澤也離卦用九坎卦用六太白真人云五行顛倒術龍從火裏出五行不順行虎向水中生又曰欲知顛倒術相尅乃相生又曰欲知顛倒由離坎須識浮沉定主賔草堂歌曰若欲學長生先須算五行五行不顛倒還丹不解成會得五行顛倒方知利中有害害却成利珞琭子云每見凶中有吉吉乃先凶隂符經所謂天有五賊見之者昌且以天地萬物觀之無有不顛倒者然須識真五行方解顛倒術曹真人云五行處處有豈是真人惜欲識五行真一水還一石鄭真人云一隂一陽之謂道一水一石之謂丹又歌曰為得鉛中金兼得石中水蓋水中出金石中出液所謂天地設位而易行乎其中矣日南午太隂之氣乘於餘陽燕坐燕坐者懦家所謂潜神釋氏所謂坐禪左玄真人云夫欲修生放捨外事無令干心然後安坐內觀於心若覺一念起即除滅其法要於淨室寬衣疊足蟠坐閉目安穩一切善惡都莫思量則元氣自復兀然而住矣調息太白真人授冲和子云神廬者鼻也夫欲安元和之氣先淨室中調令氣微微然小則生之門大則死之路故生死之機在此矣啓之又不可閉之又難為但令微之又微不得令奔而口吐故老子云綿綿若存用之不勤容成子吐故納新察鼻之出入內觀經云元氣入鼻灌泥丸也保神經云欲得延年壽無過治髓門髓門者玄牝之門也心無外緣黃庭經云臍下一寸名曰下丹田劉真君歌曰欲得不死長在天須將元氣守丹田大抵心無外緣是真人初修道法所謂收視反聽其法要喘息不出於鼻內思惟不離於身中老子云雖有榮觀燕處超然君子終日行不離輜重皆此義也以神馭氣尹真人曰若神能馭氣即鼻不失於息真人以神為車以氣為馬終日行而不失上至泥丸下至命門二境相通可救老殘若呼不得神宰一息不全若吸不得神宰一息不全若能息息之中神氣相合子毋不相離即當內結求死不得功成之後男子關元無聚精女子臍下不結嬰若神氣各馳情為欲牽元氣下降自不能制遂有畎澮之憂若息息之中神氣相持子母不離雖有㑹合常味於無味乃於得術矣西竺迦葉留形馬明龍樹並得此密傳於世得聞此者皆纍世積福於仙録有緣乃可遇之古歌曰若欲長生學伏心莫觀他事去來今但向定中神氣合何憂不至大仙林閉神廬以定火候草衣子歌曰採鍊鉛汞在午前一隂生即破其乾所以修生之士陽時則服氣午後只閉息而已所以鍊隂也赤城記所謂鍊氣者閉息也閉息千日則五臟不交六腑不傳百脉不行百關自湊神氣自御萬化自定天地不能盜其體隂陽不能衰其形從一至十從十至百從百至千閉息一百二十為小乘閉息一千二百為中乘閉息一萬二千為大乘晝夜計一萬三千五百息呼吸計五百四十動為一息去仙不遠矣其術湛然無思澄心燕坐昂頭瞑目閉息以右手第二指第三節謂之生死門受神之所乃以數珠按之心默數之息急即右轉咽喉不可令大急急則微出外氣復吸則止此在口訣開生門而復嬰兒胎息者抱一守中之法也嬰兒在腹中取氣於臍管十月脫胎即取氣於神廬真人鼻無出入其息深深老子所謂復歸於嬰兒者胎息之謂也胎息歌云鼻口非呼吸方為胎息功雖居宇宙內如在胞胎中世人為生門有臍蓋閉塞所以氣出不得臍虛之後求息則息自然氣從此處出鼻中無息也蟠足正坐兩手交在臍上者為臍虛存一之後應從此處出也聖胎內結握固凝然衛生之經思過半矣自子至午為鍊陽自午至酉為鍊隂陽主乎動隂主乎靜陽不欲溢隂不欲覆隂平陽祕精神乃治然而知之非難持之在久無間斷與道相應則內外俱進而還丹之事可議矣谷神論含津鍊氣吐故納新上入泥丸下注丹田謂之內丹陽龍隂虎木液金精二氣交會烹鍊而成謂之外丹修道之人先成內丹後鍊外藥內外相應即致神仙煙蘿子云真外應丹自來金華山人云只修真氣不修丹到了多應變化難定機子亦云雖是長生客未為拔宅仙更須修大藥方始得飛仙引導訣並閉息為之息滿急則微微吐放仰托一度埋三焦雙手極力向上如擎天狀托之左右各三次左肝右肺如射鵰先左引次右引極力為之如前東肝單托西通腎右手握固柱右腎堂左手極力托之左手握固柱左腎堂右手極力托之左右各三次五勞回顧七傷調右手抱左肘則左顧左手抱右肘則右顧皆極力三作游魚擺尾通心臟雙展兩臂擺之數多為妙手攀雙足理於腰正坐舒展雙足以雙手取足心極力三攀之次鳴天鼓三十六兩手掩耳後頭敲雙手緊掩兩耳叩齒三十六下以第二指敲耳後骨靈劔子引導子午記
